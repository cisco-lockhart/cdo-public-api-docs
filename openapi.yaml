            summary: Opt out of ASA Health Metrics
            tags:
                - Device Health
        get:
            description: |-
                Returns time-series metrics such as CPU, memory, disk, connections, and environment data over a specified time range. Supports filtering by device and metric. Pagination applies only when device UIDs are not specified.

                **Prerequisites:**

                1. Health metrics must be enabled for your tenant. See [Opt In to ASA Health Metrics](https://developer.cisco.com/docs/cisco-security-cloud-control-firewall-manager/opt-in-to-asa-health-metrics/).
                2. Health metrics collection is automatically enabled for all CDG-managed ASAs — no additional action is required for these devices.
                3. Each SDC-managed ASA device must be individually enabled for health metrics (individually or in bulk) using the [Modify Devices](https://developer.cisco.com/docs/cisco-security-cloud-control-firewall-manager/modify-devices/) endpoint.

                **Time range (required — specify exactly one):**

                - `start` and `end`: both must be provided together as ISO 8601 timestamps, OR
                - `timeRange`: a predefined relative range (e.g. `1h`, `24h`).

                Providing both `start`/`end` and `timeRange`, or neither, will result in a validation error.

                If health metrics are not enabled, this endpoint returns a `422` error.
            operationId: getAsaHealthMetrics
            parameters:
                - description: Start of the time range (ISO 8601 format). Required together with `end`. Mutually exclusive with `timeRange`.
                  example: 2025-04-05T00:00:00Z
                  in: query
                  name: start
                  required: false
                  schema:
                    default: null
                    type: string
                - description: End of the time range (ISO 8601 format). Required together with `start`. Mutually exclusive with `timeRange`.
                  example: 2025-04-05T04:00:00Z
                  in: query
                  name: end
                  required: false
                  schema:
                    default: null
                    type: string
                - description: Relative time range. Mutually exclusive with `start`/`end` — exactly one of `timeRange` or `start`/`end` must be provided. Data is collected every 10 minutes, so shorter time ranges may return fewer data points.
                  example: 10m
                  in: query
                  name: timeRange
                  required: false
                  schema:
                    default: null
                    enum:
                        - 10m
                        - 30m
                        - 1h
                        - 24h
                        - 7d
                    type: string
                - description: Maximum number of device records to return (used only when no deviceUids are provided).
                  in: query
                  name: limit
                  required: false
                  schema:
                    default: "50"
                    maximum: 50
                    minimum: 0
                    type: string
                - description: Offset for pagination (used only when no deviceUids are provided).
                  in: query
                  name: offset
                  required: false
                  schema:
                    default: "0"
                    minimum: 0
                    type: string
                - description: Comma-separated list of device UIDs to query. Max 50. If omitted, results are paginated.
                  example: 256461f6-bd60-11ef-8beb-6cf1610cf55d,41a1d57b-ffc2-49aa-933b-440cdd76b2fc
                  in: query
                  name: deviceUids
                  required: false
                  schema:
                    default: null
                    maxLength: 50
                    minLength: 0
                    type: string
                - description: Comma-separated list of metrics to return (e.g. cpu, mem). Returns all if omitted.
                  example: cpu,mem
                  in: query
                  name: metrics
                  required: false
                  schema:
                    default: null
                    enum:
                        - cpu
                        - mem
                        - disk
                        - env
                        - connections
                        - natTranslations
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MetricsResponse'
                    description: Successfully retrieved time-series metrics for one or more ASA devices.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "404":
                    $ref: '#/components/responses/http404NotFound'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get time-series health metrics for one or more ASA devices
            tags:
                - Device Health
        post:
            description: Allow Security Cloud Control Firewall Manager to collect health metrics for ASAs in this tenant. By default, metrics are collected from all Cloud Device Gateway–managed ASAs. To let Security Cloud Control Firewall Manager collect metrics from Secure Device Connector–managed devices, set the <code>optedInToAsaHealthMetrics</code> property on each device using the <a href="https://developer.cisco.com/docs/cisco-security-cloud-control/modify-device/">Modify Device</a> endpoint. <b>Note:</b> A single Secure Device Connector can support metrics collection for up to 50 ASAs.
            operationId: optInToAsaHealthMetrics
