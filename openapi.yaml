                        - FORBIDDEN
                        - NOT_FOUND
                        - METHOD_NOT_ALLOWED
                        - CONFLICT
                        - TOO_MANY_REQUESTS
                        - SERVER_ERROR
                        - PROXY_ERROR
                        - BAD_REQUEST
                        - UNPROCESSABLE_ENTITY
                    example: INVALID_INPUT
                    type: string
                errorMsg:
                    description: Human-readable error description in English.
                    example: sample error
                    type: string
        CreateRequest:
