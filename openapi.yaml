                  in: query
                  name: deviceUids
                  required: false
                  schema:
                    default: null
                    maxLength: 50
                    minLength: 0
                    type: string
                - description: Comma-separated list of metrics to return (e.g. cpu, mem). Returns all if omitted.
                  example: cpu,mem
                  in: query
                  name: metrics
                  required: false
                  schema:
                    default: null
                    enum:
