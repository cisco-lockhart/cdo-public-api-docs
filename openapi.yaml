                        - REFRESH_RA_VPN_SESSIONS
                        - TERMINATE_USER_RA_VPN_SESSIONS
                        - UPGRADE_ASA
                        - UPGRADE_FTD
                        - UPGRADE_FTD_CACHE
                        - UPGRADE_SECURE_CLIENT_PACKAGES
                        - MSP_UPGRADE_ASAS
                        - MSP_UPGRADE_FTDS
                        - MSP_GET_COMPATIBLE_FTD_UPGRADE_PACKAGES
                        - CREATE_SDC
                        - SEND_AI_ASSISTANT_MESSAGE
                        - MSP_CREATE_TENANT
                        - MSP_REVOKE_TENANT_MSP_PORTAL_RELATIONSHIP
                        - MSP_ADD_USERS_TO_TENANT
                        - MSP_ADD_USER_GROUPS_TO_TENANT
                        - MSP_DELETE_USERS_FROM_TENANT
                        - MSP_DELETE_USER_GROUPS_FROM_TENANT
                        - MSP_ADD_EXISTING_TENANT
                        - MSP_ENABLE_MULTICLOUD_DEFENSE
                        - MSP_PROVISION_CDFMC
                        - MSP_UPDATE_TENANT_SETTINGS
                        - CREATE_USERS
                        - DELETE_USERS
                        - EXECUTE_ASA_COMMAND
                        - ANALYZE_POLICIES
                        - TRIGGER_FMC_DATA_EXPORT
                        - STAGE_POLICIES
                        - SYNC_POLICIES
                        - EXPORT_DEVICES
