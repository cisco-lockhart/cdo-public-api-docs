    - url: https://manage.securitydod.cisco/api/rest
      description: IL5
components:
    schemas:
        PublicThousandEyesOutageDto:
            properties:
                affectedDomains:
                    items:
                        type: string
                    type: array
                alertId:
                    format: uuid
                    type: string
                applicationName:
                    type: string
                durationSeconds:
                    format: int32
                    type: integer
                end:
                    format: date-time
                    type: string
                errors:
                    items:
                        type: string
                    type: array
                outageType:
                    type: string
                regions:
                    items:
                        type: string
                    type: array
                severity:
                    type: string
                start:
                    format: date-time
                    type: string
            type: object
    securitySchemes:
        bearerAuth:
            bearerFormat: JWT
            scheme: bearer
            type: http
