openapi: 3.0.1
info:
    title: Cisco Security Cloud Control Firewall Manager API
    version: 1.20.0
    description: Use the documentation to explore the endpoints Security Cloud Control Firewall Manager has to offer
    contact:
        name: Cisco Security Cloud Control TAC
        email: cdo.tac@cisco.com
paths:
    /v1/application-insights/outages:
        get:
            description: Get a list of application outages that started in the specified time period
            operationId: getApplicationOutages
            parameters:
                - description: Start time for outage (UTC; represented using the RFC-3339 standard, inclusive)
                  example: 2025-01-01T00:00:00Z
                  in: query
                  name: start
                  required: false
                  schema:
                    format: date-time
                    type: string
                - description: End time for outage (UTC; represented using the RFC-3339 standard, exclusive)
                  example: 2025-01-31T23:59:59Z
                  in: query
                  name: end
                  required: false
                  schema:
                    format: date-time
                    type: string
                - description: Relative time range (mutually exclusive with start/end).
                  example: 24h
                  in: query
                  name: timeRange
                  required: false
                  schema:
                    enum:
                        - 24h
                        - 7d
                        - 30d
                    type: string
                - description: Filter by application name
                  example: Webex
                  in: query
                  name: applicationName
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PublicThousandEyesOutageDto'
                    description: List of application outages that started in the specified time period
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
            security:
                - bearerAuth: []
            summary: Get Application Outages
            tags:
                - Application Insights
    /v1/licenses/devices:
        get:
            description: 'Get a paginated list of device licenses. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: getDeviceLicenses
            parameters:
                - description: Number of results to retrieve.
                  in: query
                  name: limit
                  required: false
                  schema:
                    maximum: 200
                    minimum: 0
                    type: string
                - description: Offset of the results retrieved. The Security Cloud Control APIs use the offset field to determine the index of the first result retrieved, and will retrieve `limit` results from the offset specified.
                  in: query
                  name: offset
                  required: false
                  schema:
                    minimum: 0
                    type: string
                - description: The query to execute. Use the Lucene Query Syntax to construct your query.
                  example: fieldName:fieldValue
                  in: query
                  name: q
                  required: false
                  schema:
                    type: string
                - description: The fields to sort results by.
                  example: name:DESC
                  in: query
                  name: sort
                  required: false
                  schema:
                    items:
                        type: string
                    type: array
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DeviceLicensePage'
                    description: List of device licenses
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Device Licenses
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/devices/{deviceUid}:
        get:
            description: 'Retrieves the device licensing information for a specific device identified by UID. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: getDeviceLicensesByUid
            parameters:
                - description: The unique identifier (UID) of the device
                  in: path
                  name: deviceUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DeviceLicenseDto'
                    description: Device licensing information for specified device UID
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "404":
                    content:
                        application/json: {}
                    description: Device licensing information not found for the specified device UID
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Device Licensing Information by Device UID
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/devices/export:
        post:
            description: 'This is an asynchronous operation to export per-device licenses in CSV format. Once complete, the file can be downloaded using a presigned AWS S3 URL specified in the entityUrl field of the transaction that expires in 1 hour. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: exportDeviceLicenses
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ExportInput'
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CdoTransaction'
                    description: Security Cloud Control Transaction object that can be used to track the status of the export. Once complete, the <code>entityUrl</code> field of the transaction will contain a presigned AWS S3 URL, valid for 1 hour, to download the exported file.
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Export Per-Device Licenses
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/smart-accounts:
        get:
            description: 'Get the Smart Accounts and the number of Virtual Accounts used in this tenant. Note: This endpoint does not display all the Smart Accounts, or number of Virtual Accounts within a Smart Account, to which the customer has access. Only Smart Accounts — and number of Virtual Accounts therein — that have licenses used by devices in this tenant are displayed. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: getSmartAccounts
            parameters:
                - description: Number of results to retrieve.
                  in: query
                  name: limit
                  required: false
                  schema:
                    maximum: 200
                    minimum: 0
                    type: string
                - description: Offset of the results retrieved. The Security Cloud Control APIs use the offset field to determine the index of the first result retrieved, and will retrieve `limit` results from the offset specified.
                  in: query
                  name: offset
                  required: false
                  schema:
                    minimum: 0
                    type: string
                - description: The query to execute. Use the Lucene Query Syntax to construct your query.
                  example: fieldName:fieldValue
                  in: query
                  name: q
                  required: false
                  schema:
                    type: string
                - description: The fields to sort results by.
                  example: name:DESC
                  in: query
                  name: sort
                  required: false
                  schema:
                    items:
                        type: string
                    type: array
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SmartAccountsPage'
                    description: List of Smart Accounts
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Smart Accounts used in this tenant.
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/smart-accounts/{smartAccountUid}:
        get:
            description: 'Get Smart Account identified by UID. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: getSmartAccountByUid
            parameters:
                - description: The unique identifier (UID) of the smart account
                  in: path
                  name: smartAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SmartAccountDto'
                    description: Smart Account for specified UID
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "404":
                    content:
                        application/json: {}
                    description: Smart Account not found for the specified UID
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Smart Account by UID
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/smart-accounts/{smartAccountUid}/virtual-accounts:
        get:
            description: 'Get the Virtual Accounts for a specific Smart Account used in this tenant. Note: This endpoint does not display all the Virtual Accounts within the Smart Account to which the customer has access. Only Virtual Accounts that have licenses used by devices in this tenant are displayed. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: getVirtualAccounts
            parameters:
                - description: Number of results to retrieve.
                  in: query
                  name: limit
                  required: false
                  schema:
                    maximum: 200
                    minimum: 0
                    type: string
                - description: Offset of the results retrieved. The Security Cloud Control APIs use the offset field to determine the index of the first result retrieved, and will retrieve `limit` results from the offset specified.
                  in: query
                  name: offset
                  required: false
                  schema:
                    minimum: 0
                    type: string
                - description: The query to execute. Use the Lucene Query Syntax to construct your query.
                  example: fieldName:fieldValue
                  in: query
                  name: q
                  required: false
                  schema:
                    type: string
                - description: The fields to sort results by.
                  example: name:DESC
                  in: query
                  name: sort
                  required: false
                  schema:
                    items:
                        type: string
                    type: array
                - description: The unique identifier (UID) of the smart account
                  in: path
                  name: smartAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/VirtualAccountsPage'
                    description: List of Virtual Accounts
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get the Virtual Accounts for a specific Smart Account used in this tenant.
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/smart-accounts/{smartAccountUid}/virtual-accounts/{virtualAccountUid}:
        get:
            description: 'Get Virtual Account identified by UID within a specific Smart Account. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: getVirtualAccountByUid
            parameters:
                - description: The unique identifier (UID) of the smart account
                  in: path
                  name: smartAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
                - description: The unique identifier (UID) of the virtual account
                  in: path
                  name: virtualAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/VirtualAccountDto'
                    description: Virtual Account for specified UID
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "404":
                    content:
                        application/json: {}
                    description: Virtual Account not found for the specified UID
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Virtual Account by UID
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/smart-accounts/{smartAccountUid}/virtual-accounts/{virtualAccountUid}/licenses:
        get:
            description: 'This endpoint returns information on all of the licenses used by devices across this tenant that are registered to Smart License using a token generated in this Virtual Account. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: getVirtualAccountLicenses
            parameters:
                - description: Number of results to retrieve.
                  in: query
                  name: limit
                  required: false
                  schema:
                    maximum: 200
                    minimum: 0
                    type: string
                - description: Offset of the results retrieved. The Security Cloud Control APIs use the offset field to determine the index of the first result retrieved, and will retrieve `limit` results from the offset specified.
                  in: query
                  name: offset
                  required: false
                  schema:
                    minimum: 0
                    type: string
                - description: The query to execute. Use the Lucene Query Syntax to construct your query.
                  example: fieldName:fieldValue
                  in: query
                  name: q
                  required: false
                  schema:
                    type: string
                - description: The fields to sort results by.
                  example: name:DESC
                  in: query
                  name: sort
                  required: false
                  schema:
                    items:
                        type: string
                    type: array
                - description: The unique identifier (UID) of the smart account
                  in: path
                  name: smartAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
                - description: The unique identifier (UID) of the virtual account
                  in: path
                  name: virtualAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Page'
                    description: List of licenses for the specified Virtual Account.
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "404":
                    content:
                        application/json: {}
                    description: Virtual Account with UID not found within the given Smart Account.
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Licenses for a Virtual Account
            tags:
                - Licensing
            x-beta: "true"
    /v1/licenses/smart-accounts/{smartAccountUid}/virtual-accounts/{virtualAccountUid}/licenses/export:
        post:
            description: 'This endpoint exports all of the licenses used by devices across this tenant that are registered to Smart License using a token generated in this Virtual Account. Note: ⚠️ This endpoint is currently in limited availability. Please contact your Cisco account team or Cisco TAC to request access.'
            operationId: exportVirtualAccountLicenses
            parameters:
                - description: The unique identifier, represented as a UUID, of the smart account
                  in: path
                  name: smartAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
                - description: The unique identifier, represented as a UUID, of the virtual account
                  in: path
                  name: virtualAccountUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ExportInput'
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CdoTransaction'
                    description: Security Cloud Control Transaction object that can be used to track the status of the export. Once complete, the <code>entityUrl</code> field of the transaction will contain a presigned AWS S3 URL, valid for 1 hour, to download the exported file.
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "404":
                    content:
                        application/json: {}
                    description: Virtual Account with UID not found within the given Smart Account.
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Export Licenses for a Virtual Account
            tags:
                - Licensing
            x-beta: "true"
    /v1/objects:
        get:
            description: 'Get objects in the Security Cloud Control tenant. To use the object APIs, contact customer support or provision Multicloud Defense and turn on object sharing. Note: the object APIs only support operations on network objects and groups.'
            operationId: getObjects
            parameters:
                - description: The query to execute. Use the Lucene Query Syntax to construct your query. Possible fields to search by are name, content.
                  example: content:*2.2.* AND name:Lab1
                  in: query
                  name: q
                  required: false
                  schema:
                    type: string
                - description: If enabled, the search will also include results from override objects.
                  in: query
                  name: includeOverrides
                  required: false
                  schema:
                    default: false
                    type: boolean
                - description: The offset of the results retrieved. The Security Cloud Control API uses the offset field to determine the index of the first result retrieved, and will retrieve `limit` results from the offset specified.
                  in: query
                  name: offset
                  required: false
                  schema:
                    minimum: 0
                    type: string
                - description: The number of results to retrieve.
                  in: query
                  name: limit
                  required: false
                  schema:
                    maximum: 200
                    minimum: 1
                    type: string
                - deprecated: true
                  description: The fields to sort results by. This parameter is deprecated.
                  example: name:DESC
                  in: query
                  name: sortBy
                  required: false
                  schema:
                    type: string
                - description: The fields to sort results by.
                  example: name:DESC
                  in: query
                  name: sort
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListObjectResponse'
                    description: A paginated view of the Security Cloud Control objects.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Objects
            tags:
                - Object Management
        post:
            description: 'Create an object in the Security Cloud Control tenant. To use the object APIs, contact customer support or provision Multicloud Defense and turn on object sharing. Note: the object APIs only support operations on network objects and groups.'
            operationId: createObject
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ObjectResponse'
                    description: A descriptive representation of the created Security Cloud Control object.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Create Object
            tags:
                - Object Management
    /v1/objects/{uid}:
        delete:
            description: 'Delete an object in the Security Cloud Control tenant. To use the object APIs, contact customer support or provision Multicloud Defense and turn on object sharing. Note: the object APIs only support operations on network objects and groups.'
            operationId: deleteObject
            parameters:
                - description: The unique identifier of the object being deleted.
                  example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                  in: path
                  name: uid
                  required: true
                  schema:
                    format: uuid
                    type: string
                - description: Force mode is required to delete an object that hasn't targets but is in use by another object.
                  example: false
                  in: query
                  name: forcedDelete
                  required: false
                  schema:
                    default: false
                    type: boolean
            responses:
                "204":
                    content:
                        '*/*':
                            schema:
                                type: object
                    description: No content
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Delete Object
            tags:
                - Object Management
        get:
            description: 'Gets an object in the Security Cloud Control tenant. To use the object APIs, contact customer support or provision Multicloud Defense and turn on object sharing. Note: the object APIs only support operations on network objects and groups.'
            operationId: getObject
            parameters:
                - description: The unique identifier of the object being retrieved.
                  example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                  in: path
                  name: uid
                  required: true
                  schema:
                    format: uuid
                    type: string
                - description: The scope of the fields to be retrieved. One of ["@basic", "@detailed"]. Defaults to "@basic".
                  example: '@detailed'
                  in: query
                  name: fields
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ObjectResponse'
                    description: OK
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Object
            tags:
                - Object Management
        patch:
            description: 'Modify an object in the Security Cloud Control tenant. To use the object APIs, contact customer support or provision Multicloud Defense and turn on object sharing. Note: the object APIs only support operations on network objects and groups.'
            operationId: modifyObject
            parameters:
                - description: The unique identifier of the object being updated.
                  example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                  in: path
                  name: uid
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ObjectResponse'
                    description: A descriptive representation of the updated Security Cloud Control object.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Modify Object
            tags:
                - Object Management
    /v1/objects/{uid}/duplicates:
        get:
            description: 'Get objects in the Security Cloud Control tenant that are duplicates of the given object. To use the object APIs, contact customer support or provision Multicloud Defense and turn on object sharing. Note: the object APIs only support operations on network objects and groups.'
            operationId: getDuplicateObjects
            parameters:
                - description: The unique identifier of the object to retrieve duplicates for.
                  example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                  in: path
                  name: uid
                  required: true
                  schema:
                    format: uuid
                    type: string
                - description: the unique identifier of the target to restrict the duplicate search to.
                  example: 6131daad-e813-4b8f-8f42-be1e241e8cdb
                  in: query
                  name: targetUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/DuplicateGroupDto'
                                type: array
                    description: Duplicates of the object.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
