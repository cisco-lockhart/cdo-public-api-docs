    /v1/inventory/devices/asas/health/{deviceUid}/interfaces:
        get:
            description: |-
                Returns time-series interface metrics - including link status, overruns, and other key performance indicators - over a specified time range. Supports filtering by interface and metric. Pagination applies only when interface UIDs are not specified.

                **Prerequisites:**

                1. Health metrics must be enabled for your tenant. See [Opt In to ASA Health Metrics](https://developer.cisco.com/docs/cisco-security-cloud-control-firewall-manager/opt-in-to-asa-health-metrics/).
                2. Health metrics collection is automatically enabled for all CDG-managed ASAs — no additional action is required for these devices.
                3. Each SDC-managed ASA device must be individually enabled for health metrics (individually or in bulk) using the [Modify Devices](https://developer.cisco.com/docs/cisco-security-cloud-control-firewall-manager/modify-devices/) endpoint.

                If health metrics are not enabled, this endpoint returns a `422` error.
            operationId: getAsaInterfaceHealthMetrics
            parameters:
                - description: The unique identifier, represented as a UUID, of the ASA device in Security Cloud Control.
                  in: path
                  name: deviceUid
                  required: true
                  schema:
                    default: null
                    type: string
                - description: Start of the time range (ISO 8601 format). Required together with `end`. Mutually exclusive with `timeRange`.
                  example: 2025-04-05T00:00:00Z
                  in: query
                  name: start
                  required: false
                  schema:
                    default: null
                    type: string
                - description: End of the time range (ISO 8601 format). Required together with `start`. Mutually exclusive with `timeRange`.
                  example: 2025-04-05T04:00:00Z
                  in: query
                  name: end
                  required: false
                  schema:
                    default: null
                    type: string
                - description: Relative time range. Mutually exclusive with `start`/`end` — exactly one of `timeRange` or `start`/`end` must be provided. Data is collected every 10 minutes, so shorter time ranges may return fewer data points.
                  example: 10m
                  in: query
                  name: timeRange
                  required: false
                  schema:
                    default: null
                    enum:
                        - 10m
                        - 30m
                        - 1h
                        - 24h
                        - 7d
                    type: string
                - description: Maximum number of device records to return (used only when no deviceUids are provided).
                  in: query
                  name: limit
                  required: false
                  schema:
                    default: "50"
                    maximum: 50
                    minimum: 0
                    type: string
                - description: Offset for pagination (used only when no deviceUids are provided).
                  in: query
                  name: offset
                  required: false
                  schema:
                    default: "0"
                    minimum: 0
                    type: string
                - description: Comma-separated list of interface UIDs to query. Max 50. If omitted, results are paginated.
                  example: def6c34a-a5d4-45c1-8d96-820fb00de723,4bc125a0-cf08-4dcc-bfac-45669ba898b0
                  in: query
                  name: interfaceUids
                  required: false
                  schema:
                    default: null
                    maxLength: 50
                    maximum: 50
                    minLength: 0
                    type: string
                - description: Comma-separated list of metrics to return (e.g. linkStatus, overruns). Returns all if omitted.
                  example: linkStatus,overruns
                  in: query
                  name: metrics
                  required: false
                  schema:
                    default: null
                    enum:
                        - overruns
                        - underruns
                        - droppedPackets
                        - l2DecodeDrops
                        - inputErrors
                        - outputErrors
                        - inputPacketSize
                        - outputPacketSize
                        - linkStatus
                    type: string
                - description: Lucene-style query filter. Supports logical operators AND, OR, and NOT.Applicable only to the fields name and linkStatus.
                  example: name:GigabitEthernet* OR linkStatus:1
                  in: query
                  name: q
                  required: false
                  schema:
                    default: null
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MetricsResponse'
                    description: Successfully retrieved time-series metrics for one or more interfaces.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "404":
                    $ref: '#/components/responses/http404NotFound'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get time-series interface metrics for an ASA device
            tags:
                - Device Health
