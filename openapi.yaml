openapi: 3.0.1
info:
    title: Cisco Security Cloud Control Firewall Manager API
    version: 1.20.0
    description: Use the documentation to explore the endpoints Security Cloud Control Firewall Manager has to offer
    contact:
        name: Cisco Security Cloud Control TAC
        email: cdo.tac@cisco.com
paths:
    /v1/application-insights/outages:
        get:
            description: Get a list of application outages that started in the specified time period
            operationId: getApplicationOutages
            parameters:
                - description: Start time for outage (UTC; represented using the RFC-3339 standard, inclusive)
                  example: 2025-01-01T00:00:00Z
                  in: query
                  name: start
                  required: false
                  schema:
                    default: ""
                    type: string
                - description: End time for outage (UTC; represented using the RFC-3339 standard, exclusive)
                  example: 2025-01-31T23:59:59Z
                  in: query
                  name: end
                  required: false
                  schema:
                    default: ""
                    type: string
                - description: Relative time range (mutually exclusive with start/end).
                  example: 24h
                  in: query
                  name: timeRange
                  required: false
                  schema:
                    default: ""
                    enum:
                        - 24h
                        - 7d
                        - 30d
                    type: string
                - description: Filter by application name
                  example: Webex
                  in: query
                  name: applicationName
                  required: false
                  schema:
                    default: ""
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PublicThousandEyesOutageDto'
                    description: List of application outages that started in the specified time period
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "405":
                    $ref: '#/components/responses/http405MethodNotAllowed'
            security:
                - bearerAuth: []
            summary: Get Application Outages
            tags:
                - Application Insights
    /v1/inventory/devices/asas/{deviceUid}/etherchannelinterfaces:
        get:
            description: Get a list of ASA EtherChannel interfaces. An EtherChannel interface is a logical port-channel interface that aggregates multiple physical Ethernet links into a single logical interface to increase bandwidth and provide redundancy. It is configured and used like a physical interface for interface-related features, and supports up to 48 EtherChannels, depending on the ASA model.
            operationId: getAsaEtherChannelInterfaces
            parameters:
                - description: Number of results to retrieve.
                  in: query
                  name: limit
                  required: false
                  schema:
                    default: "50"
                    maximum: 200
                    minimum: 0
                    type: string
                - description: Offset of the results retrieved. The Security Cloud Control APIs use the offset field to determine the index of the first result retrieved, and will retrieve `limit` results from the offset specified.
                  in: query
                  name: offset
                  required: false
                  schema:
                    default: "0"
                    minimum: 0
                    type: string
                - description: Unique identifier (UUID) of the device.
                  in: path
                  name: deviceUid
                  required: true
                  schema:
                    default: null
                    type: string
                - description: The query to execute. Use the Lucene Query Syntax to construct your query.
                  example: fieldName:fieldValue
                  in: query
                  name: q
                  required: false
                  schema:
                    default: null
                    type: string
                - description: The fields to sort results by.
                  example: name:DESC
                  in: query
                  name: sort
                  required: false
                  schema:
                    default: null
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AsaInterfacePage'
                    description: List of AsaInterface objects
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get ASA EtherChannel interfaces
            tags:
                - ASA Interfaces
        post:
            description: Create an ASA EtherChannel interface. An EtherChannel interface is a logical port-channel interface that aggregates multiple physical Ethernet links into a single logical interface to increase bandwidth and provide redundancy. It is configured and used like a physical interface for interface-related features, and supports up to 48 EtherChannels, depending on the ASA model.
            operationId: createAsaEtherChannelInterface
            parameters:
                - description: Unique identifier (UUID) of the device.
                  in: path
                  name: deviceUid
                  required: true
                  schema:
                    default: null
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/EtherChannelInterfaceCreateInput'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AsaInterface'
                    description: AsaInterface object
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "500":
                    content:
                        application/json:
                            schema:
