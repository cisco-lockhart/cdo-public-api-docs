components:
    schemas:
        AuthenticationError:
            properties:
                error:
                    description: A human-readable error description in English.
                    example: invalid_token
                    type: string
                errorDescription:
                    description: A human-readable error description in English.
                    example: Your token is invalid
                    type: string
        CommonApiError:
            properties:
                details:
                    additionalProperties:
                        description: Additional details, if any, about the error.
                        example: {}
                        type: object
                    description: Additional details, if any, about the error.
                    example: {}
                    type: object
                errorCode:
                    description: Unique code that describes the error.
                    enum:
                        - INVALID_INPUT
                        - UNAUTHORIZED
                        - FORBIDDEN
                        - NOT_FOUND
                        - METHOD_NOT_ALLOWED
                        - CONFLICT
                        - TOO_MANY_REQUESTS
                        - SERVER_ERROR
                        - PROXY_ERROR
                        - BAD_REQUEST
                        - UNPROCESSABLE_ENTITY
                    example: INVALID_INPUT
                    type: string
                errorMsg:
                    description: Human-readable error description in English.
                    example: sample error
                    type: string
        CreateRequest:
            properties:
                description:
                    description: The human-readable description of the object
                    example: My object description
                    type: string
                labels:
                    description: The labels for the object
                    example:
                        - migration
                    items:
                        type: string
                    type: array
                    uniqueItems: true
                name:
                    description: The name of the object
                    example: my-object
                    minLength: 1
                    type: string
                tags:
                    additionalProperties:
                        items:
                            type: string
                        type: array
                        uniqueItems: true
                    description: The tags for the object
                    example:
                        location:
                            - London
                            - Head-office
                    type: object
                targetIds:
                    description: Set of IDs for targets that contain the object. A target can be, for example, a device, service, or a shared policy (Ruleset).
                    example:
                        - 7131daad-e813-4b8f-8f42-be1e241e8cdb
                    items:
                        type: string
                    type: array
                    uniqueItems: true
                value:
                    $ref: '#/components/schemas/SharedObjectValue'
                    description: The value of the object
            required:
                - name
                - value
            type: object
        DuplicateGroupDto:
            properties:
                targetUid:
                    description: The unique identifier of the target to search in.
                    example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                    format: uuid
                    type: string
                unifiedObjectUids:
                    description: The set of unique identifiers of the duplicate objects.
                    items:
                        format: uuid
                        type: string
                    type: array
                    uniqueItems: true
            type: object
        GroupContent:
            description: The contents of an object group
            properties:
                literals:
                    description: List of content literals
                    items:
                        $ref: '#/components/schemas/SingleContent'
                    type: array
                referencedObjectUids:
                    description: Set of UIDs of the group's referenced objects
                    example:
                        - 7131daad-e813-4b8f-8f42-be1e241e8cdb
                    items:
                        format: uuid
                        type: string
                    type: array
                    uniqueItems: true
            type: object
        Icmp4Value:
            properties:
                icmp4Code:
                    enum:
                        - NET_UNREACHABLE
                        - HOST_UNREACHABLE
                        - PROTOCOL_UNREACHABLE
                        - PORT_UNREACHABLE
                        - FRAGMENTATION_NEEDED
                        - SOURCE_ROUTE_FAILED
                        - DEST_NETWORK_UNKNOWN
                        - DEST_HOST_UNKNOWN
                        - SRC_HOST_ISOLATED
                        - COMMUNICATION_DEST_NET_PROHIBITED
                        - COMMUNICATION_DEST_HOST_PROHIBITED
                        - DEST_NET_UNREACHABLE_FOR_TOS
                        - DEST_HOST_UNREACHABLE_FOR_TOS
                        - COMM_ADMINISTRATIVELY_PROHIBITED
                        - HOST_PRECEDENCE_VIOLATION
                        - PRECEDENCE_CUTOFF
                        - REDIRECT_DATAGRAM_NETWORK
                        - REDIRECT_DATAGRAM_HOST
                        - REDIRECT_DATAGRAM_SERVICE_NETWORK
                        - REDIRECT_DATAGRAM_SERVICE_HOST
                        - ALTERNATE_HOST_ADDR
                        - DO_NOT_ROUTE_COMMON_TRAFFIC
                        - NORMAL_ROUTER_ADV
                        - TTL_EXPIRED_TRANSIT
                        - FRAG_ASSEMBLY
                        - PTR_ERROR
                        - MISSING_REQD_OPTION
                        - BAD_LENGTH
                        - BAD_SPI
                        - AUTH_FAILED
                        - DECOMPRESSION_FAILED
                        - DECRYPTION_FAILED
                        - NEED_AUTHENTICATION
                        - NEED_AUTHORIZATION
                    example: NET_UNREACHABLE
                    type: string
                icmp4Type:
                    enum:
                        - ANY
                        - ECHO_REPLY
                        - DESTINATION_UNREACHABLE
                        - SOURCE_QUENCH
                        - REDIRECT_MESSAGE
                        - ALTERNATE_HOST_ADDRESS
                        - ECHO_REQUEST
                        - ROUTER_ADVERTISEMENT
                        - ROUTER_SOLICITATION
                        - TIME_EXCEEDED
                        - PARAMETER_PROBLEM
                        - TIMESTAMP
                        - TIMESTAMP_REPLY
                        - INFO_REQUEST
                        - INFO_REPLY
                        - ADDR_MASK_REQUEST
                        - ADDR_MASK_REPLY
                        - TRACEROUTE
                        - DATAGRAM_CONVERSION_ERROR
                        - MOBILE_HOST_REDIRECT
                        - WHERE_ARE_YOU
                        - HERE_I_AM
                        - MOBILE_REG_REQUEST
                        - MOBILE_REG_REPLY
                        - DOMAIN_NAME_REQUEST
                        - DOMAIN_NAME_REPLY
                        - SKIP_ALGORITHM_DISCOVERY_PROTOCOL
                        - PHOTURIS
                        - EXPERIMENTAL_MOB_PROTOCOLS
                    example: DESTINATION_UNREACHABLE
                    type: string
