        InterfaceIpAddress:
            default: null
            description: IPv6 address that is used only for communication within the same network link.
            properties:
                ipAddress:
                    default: null
                    description: Unique network address assigned to a physical or logical port, which enables the port to communicate on a specific network segment and enforce security policies for traffic traversing that interface.
                    example: IPv4 address such as 192.168.1.1 or IPv6 address such as  2001:db8::1
                    type: string
                netmask:
                    default: null
                    description: A 32-bit number that defines the network portion of an IP address, differentiating it from the host portion. This number determines the size of the local network segment directly connected to the interface, allowing it to identify which traffic belongs to its local network and which needs to be routed.
                    example: 255.255.255.0
                    type: string
                setroute:
                    default: false
                    description: Indicates whether a default route using the gateway information provided by the DHCP server is created automatically. The DHCP-assigned gateway is used as the next-hop for routing traffic.
                    type: boolean
                standbyIpAddress:
                    default: null
                    description: Secondary IP address configured in an interface, specifically for use in an HA pair. This address stays inactive in the standby unit until a failover occurs, at which point, the standby assumes ownership of both the primary and secondary IP addresses to ensure network connectivity for devices.
                    example: IPv4 address such as 192.168.1.1 or IPv6 address such as 2001:db8::1
                    type: string
            type: object
