components:
    schemas:
        AggregationThresholdItem:
            default: null
            properties:
                name:
                    default: null
                    type: string
                value:
                    default: null
                    format: int32
                    type: integer
            type: object
        ApiTokenInfo:
            default: null
            properties:
                apiToken:
                    default: null
                    description: The API Access Token.
                    example: FaKE-toKeN
                    type: string
            type: object
        AsaCompatibilityVersion:
            default: null
            properties:
                compatibleAsaVersions:
                    default: null
                    items:
                        $ref: '#/components/schemas/AsaCompatibleVersion'
                    type: array
                deviceUids:
                    default: null
                    items:
                        default: null
                        format: uuid
                        type: string
                    type: array
                hardwareModel:
                    default: null
                    type: string
            type: object
        AsaCompatibleVersion:
            default: null
            properties:
                asdmImageUrl:
                    default: null
                    type: string
                asdmVersion:
                    default: null
                    type: string
                softwareImageUrl:
                    default: null
                    type: string
                softwareVersion:
                    default: null
                    type: string
            type: object
        AsaCompatibleVersionsResponse:
            default: null
            properties:
                count:
                    default: null
                    description: The item count.
                    example: 100
                    format: int32
                    type: integer
                items:
                    default: null
                    description: The list of items retrieved.
                    items:
                        $ref: '#/components/schemas/AsaCompatibleVersion'
                    type: array
            type: object
        AsaFailoverMate:
            default: null
            description: (High Availability ASAs only) Information on the failover mate of this device.
            properties:
                chassisSerial:
                    default: null
                    description: (High Availability ASAs only) The serial number of the chassis.
                    example: FTX20131xxx
                    type: string
                failoverState:
                    default: null
                    description: (High Availability ASAs only) Failover state of this device.
                    example: Primary - Active
                    type: string
                serial:
                    default: null
                    description: (High Availability ASAs only) The serial number of the device. This is typically used for licensing, and is not the same as the chassis' serial number.
                    example: JAD24500xxx
                    type: string
                softwareVersion:
                    default: null
                    description: (High Availability ASAs only) The version of the software running on the device.
                    example: 9.18.8
                    type: string
            type: object
        AsaFailoverMode:
            default: null
            description: (ASAs only) Failover mode of the device.
            enum:
                - "OFF"
                - ACTIVE_STANDBY
                - ACTIVE_ACTIVE
            example: ACTIVE_STANDBY
            type: string
        AsaInterface:
            default: null
            properties:
                description:
                    default: null
                    description: Interface description.
                    type: string
                deviceUid:
                    default: null
                    description: Unique identifier (UUID) of the device associated with the interface.
                    example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                    format: uuid
                    type: string
                duplexType:
                    $ref: '#/components/schemas/DuplexType'
                enabled:
                    default: false
                    description: Indicates whether the interface is enabled.
                    type: boolean
                etherChannelGroupUid:
                    default: null
                    description: Unique identifier (UUID) of the EtherChannel group to which this interface belongs.
                    example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                    format: uuid
                    type: string
                etherChannelId:
                    default: null
                    description: Identifier of the EtherChannel interface in the scope of the device.
                    format: int32
                    type: integer
                hardwareName:
                    default: null
                    description: Interface hardware name. It is usually structured from the type, speed, slot and port number.
                    example: GigabitEthernet0/0 for a physical interface or GigabitEthernet0/0.100 for a subinterface
                    type: string
                interfaceType:
                    $ref: '#/components/schemas/InterfaceType'
                ipv4:
                    $ref: '#/components/schemas/InterfaceIpv4Address'
                ipv6:
                    $ref: '#/components/schemas/InterfaceIpv6Address'
                lacpMode:
                    default: null
                    description: The Link Aggregation Control Protocol (LACP) mode of the EtherChannel interface.
                    enum:
                        - ACTIVE
                        - PASSIVE
                        - "ON"
                    example: ACTIVE, PASSIVE, or ON
                    type: string
                macAddress:
                    default: null
                    description: Interface MAC address is a unique hardware identifier assigned to each physical interface and used for Layer 2 communication in a network segment.
                    type: string
                managementInterface:
                    default: false
                    description: Indicates whether the interface is used for device management.
                    type: boolean
                managementOnly:
                    default: false
                    description: Indicates whether the interface is exclusively used for management traffic and not regular user or data traffic.
                    type: boolean
                memberInterfaces:
                    default: null
                    description: Set of unique identifiers (UUIDs) of interfaces that are part of an EtherChannel group.
                    items:
                        default: null
                        description: Set of unique identifiers (UUIDs) of interfaces that are part of an EtherChannel group.
                        format: uuid
                        type: string
                    type: array
                    uniqueItems: true
                mode:
                    $ref: '#/components/schemas/InterfaceMode'
                monitorInterface:
                    default: false
                    description: Indicates if the interface is actively monitored as part of an HA setup. The check determines if the interface is functioning correctly and whether a failover to a standby device should be triggered, if required.
                    type: boolean
                mtu:
                    default: null
                    description: Interface MTU, in bytes, of a packet or frame that can be sent over a network interface without needing to be fragmented. It defines the maximum payload size the interface can handle in a single transmission. Valid range is from 64 to 9198.
                    format: int32
                    type: integer
                name:
                    default: null
                    description: Logical name of the interface, unique in the scope of the device.
                    example: my-example-interface
                    type: string
                parentInterfaceUid:
                    default: null
                    description: Unique identifier (UUID) of the parent interface.
                    example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                    format: uuid
                    type: string
                runtimeData:
                    $ref: '#/components/schemas/InterfaceRuntimeData'
                securityLevel:
                    default: null
                    description: Indicates interface trust level, ranging from 0 (lowest) to 100 (highest).
                    format: int32
                    type: integer
                speedType:
                    $ref: '#/components/schemas/SpeedType'
                standbyMacAddress:
                    default: null
                    description: Standby interface MAC address for use in HA pairs.
                    type: string
                subInterfaceId:
                    default: null
                    description: Unique identifier of the subinterface, which is used to differentiate between the subinterfaces of the same parent interface. Valid range is from 1 to 4294967295.
                    format: int64
                    type: integer
                switchPortConfig:
                    $ref: '#/components/schemas/SwitchPortConfig'
                uid:
                    default: null
                    description: Unique identifier (UUID) of the interface in Security Cloud Control.
                    example: 7131daad-e813-4b8f-8f42-be1e241e8cdb
                    format: uuid
                    type: string
                vlanId:
                    default: null
                    description: Unique identifier of the VLAN associated with VLAN interface. Valid range is from 1 to 4070.
                    format: int32
                    type: integer
                vlanPrimaryId:
                    default: null
                    description: Primary unique identifier of the VLAN associated with subinterface. Valid range is from 1 to 4094.
                    format: int32
                    type: integer
                vlanSecondaryIds:
                    default: null
                    description: Secondary identifiers of the VLAN associated with subinterface. Each range is defined by a start and end value, which allows multiple VLANs to be associated with a subinterface. All ranges are inclusive.
