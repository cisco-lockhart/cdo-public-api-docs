components:
    schemas:
        AuthenticationError:
            properties:
                error:
                    description: A human-readable error description in English.
                    example: invalid_token
                    type: string
                errorDescription:
                    description: A human-readable error description in English.
                    example: Your token is invalid
                    type: string
        CdoTransaction:
            properties:
                cancellable:
                    type: boolean
                cdoTransactionStatus:
                    description: Status of the transaction.
                    enum:
                        - PENDING
                        - IN_PROGRESS
                        - CANCELLED
                        - DONE
                        - ERROR
                    example: IN_PROGRESS
                    type: string
                entityUid:
                    description: Unique identifier of the entity that the transaction is triggered on. This can be empty, for a transaction that is not tied to an entity, such as transactions which refresh RA VPN sessions.
                    example: f5f660d4-4b81-4374-877d-fbc4bee894e2
                    format: uuid
                    type: string
                entityUrl:
                    description: URL to access the entity that the transaction is triggered on. This can be empty, for a transaction that is not tied to an entity, such as transactions which refresh RA VPN sessions.
                    example: https://edge.us.cdo.cisco.com/platform/public-api/v1/inventory/devices/f5f660d4-4b81-4374-877d-fbc4bee894e2
                    type: string
                errorDetails:
                    additionalProperties:
                        type: string
                    description: Transaction error details, if any.
                    type: object
                errorMessage:
                    description: Transaction error message, if any.
                    type: string
                lastUpdatedTime:
                    description: Time (UTC; represented using the RFC-3339 standard) at which the transaction status was last updated.
                    example: 2023-12-13T08:15:44Z
                    format: date-time
                    type: string
                submissionTime:
                    description: Time (UTC; represented using the RFC-3339 standard) at which the transaction was triggered.
                    example: 2023-12-13T05:15:44Z
                    format: date-time
                    type: string
                tenantUid:
                    description: Unique identifier of the tenant that the transaction was triggered on.
                    example: 5131daad-e813-4b8f-8f42-be1e241e2cdb
                    format: uuid
                    type: string
                transactionDetails:
                    additionalProperties:
                        type: string
                    description: Transaction details, if any.
                    type: object
                transactionPollingUrl:
                    description: Polling URL to track the progress of the transaction.
                    example: https://edge.us.cdo.cisco.com/platform/v1/transactions/7131daad-e813-4b8f-8f42-be1e241e8cdb
                    type: string
                transactionType:
                    description: Type of the transaction.
                    enum:
                        - ONBOARD_ASA
                        - ONBOARD_IOS
                        - ONBOARD_DUO_ADMIN_PANEL
                        - CREATE_FTD
                        - ONBOARD_FTD_ZTP
                        - REGISTER_FTD
