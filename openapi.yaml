    /v1/transactions/{transactionUid}:
        get:
            description: 'Get information on a CDO transaction. An CDO transaction is an entity used to monitor progress of, and provide feedback on, long-running operations. All asynchronous operations in CDO''s API create Security Cloud Control transactions. Note: CDO transactions are deleted two hours after the last update to it.'
            operationId: getTransaction
            parameters:
                - in: path
                  name: transactionUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CdoTransaction'
                    description: 'CDO Transaction that has completed, either successfully or unsuccessfully. Note: failed Security Cloud Control Transactions do not roll back.'
                "202":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CdoTransaction'
                    description: Security Cloud Control Transaction that is pending or in progress.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "404":
                    $ref: '#/components/responses/http404NotFound'
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Get Transaction
            tags:
                - Transactions
    /v1/transactions/{transactionUid}/cancel:
        post:
            description: 'Cancel a running transaction. **Note:**: Only transactions of cancellable types can be cancelled; whether a transaction is cancellable is indicated by the <pre>isCancellable</pre> field in the <pre>CdoTransaction</pre> object.'
            operationId: cancelTransaction
            parameters:
                - in: path
                  name: transactionUid
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CdoTransaction'
                    description: The cancelled CDO transaction.
                "400":
                    $ref: '#/components/responses/http400BadRequest'
                "401":
                    $ref: '#/components/responses/http401Unauthorised'
                "403":
                    $ref: '#/components/responses/http403Forbidden'
                "422":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: The transaction cannot be cancelled, because the transaction type is not cancellable.
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CommonApiError'
                    description: Internal server error.
            security:
                - bearerAuth: []
            summary: Cancel Transaction
            tags:
                - Transactions
